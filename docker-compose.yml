version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: sam_bot_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sam_bot_redis
    restart: always
    ports:
      - "6379:6379"

  bot:
    build: .
    container_name: sam_bot_app
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
    command: sh -c "alembic upgrade head && python bot.py"

volumes:
  postgres_data:
  
